name: afrirange_ai
description: Pan-African AI-powered rangeland and veld management mobile application.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # State Management & Navigation
  flutter_bloc: ^8.1.3
  go_router: ^13.2.0
  
  # Google Play Store Billing Policy Compliance
  in_app_purchase: ^3.1.13
  
  # Secure Storage & Offline Database
  flutter_secure_storage: ^9.0.0
  sqflite: ^2.3.0
  drift: ^2.14.1
  path_provider: ^2.1.2
  path: ^1.8.3
  provider: ^6.1.1
  
  # Geospatial & Offline Map Rendering
  flutter_map: ^6.0.0
  latlong2: ^0.9.0
  geolocator: ^10.1.0
  
  # Vision Camera & Photo Handling
  camera: ^0.10.5+9
  image_picker: ^1.0.7
  
  # Networking & Connectivity
  http: ^1.2.0
  connectivity_plus: ^5.0.2
  
  # Calendar & Date Formatting
  table_calendar: ^3.0.9
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  drift_dev: ^2.14.1
  build_runner: ^2.4.8

flutter:
  uses-material-design: true
  assets:
    - assets/botanical_catalog.json
